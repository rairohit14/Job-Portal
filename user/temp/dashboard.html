{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 text-center">
    <h2 class="mb-4">Welcome {{ request.user.username }}</h2>

    <div class="row justify-content-center">

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>View Jobs</h5>
                <a href="/jobs/" class="btn btn-primary mt-2">Go</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>Post Job</h5>
                <a href="/create-job/" class="btn btn-success mt-2">Go</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>Applied Jobs</h5>
                <a href="/applied-jobs/" class="btn btn-info mt-2">Go</a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
